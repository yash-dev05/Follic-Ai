<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <style>
        body {
            padding: 0;
            margin: 0;
            background-color:
                rgba(252, 245, 236);
            font-family: "Inter", sans-serif;
        }

        nav {
            background-color: #284432;
            color: white;
            display: flex;
            justify-content: center;
            /* center nav_bar horizontally */
            align-items: center;
            /* center nav_bar vertically */
            height: 75px;

        }

        .nav_bar {
            display: flex;
            flex-direction: row;
            align-items: center;
            /* optional: vertically center items */
            justify-content: space-between;
            /* optional: spread items apart */
            width: 80%;
            max-width: 1200px;
            margin-bottom: 0px;
        }

        ul {
            display: flex;
            flex-direction: row;
            list-style: none;
            /* remove bullets */
            margin: 0;
            padding: 0;
            font-size: 17px;
        }


        ul li a {
            color: white;
            text-decoration: none;
        }

        ul li {
            position: relative;
            cursor: pointer;
            margin: 0 15px;
            color: white;
            transition: color 0.3s ease;
        }

        /* subtle color change */
        ul li:hover {
            color: #fdfdb0cf;
        }

        /* premium underline animation */
        ul li::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 0%;
            height: 2px;
            background: #c49d50;
            transition: width 0.3s ease;
        }

        ul li:hover::after {
            width: 100%;
        }

        .identity {
            font-size: 22px;
            display: flex;
            align-items: center;
            /* vertically align text and logo */
            gap: 0px;
            /* space between name and logo */
        }

        .logo {
            width: 70px;
            /* adjust size as needed */
            height: auto;
            cursor: pointer;
        }


.main-analysis{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:60px;
    margin-top:50px;
}




        .pic {
            align-items: center;
            max-width: 500px;
            
            margin-top: 40px;

            cursor: pointer;
        }

        .user-pic {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 20px;
            border: 2px dotted #284432;
            background-color: rgba(253, 236, 215, 0.89);
            transition: all 0.4s;
        }

        .user-pic:hover {
            border: 2px solid #284432;
            border-radius: 60px;
            background-color: rgba(255, 231, 201, 0.764);

        }

        .uploaded-image {
            width: 100%;
        }

        .upload-text {
            font-size: 16px;
            color: #27412e;
        }



        .questionnaire {
            margin-top: 60px;
            display: flex;
            justify-content: center;
        }

        .quiz-container {
            width: 500px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .quiz-header {
            text-align: center;
        }

        .quiz-header h2 {
            color: #284432;
        }

        .quiz-header p {
            color: #4a5c55;
            font-size: 14px;
        }

        /* progress bar */

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin: 25px 0;
        }

        .progress{
    height:100%;
    width:0%;
    background:#c49d50;
    border-radius:10px;
}

        /* questions */

        .question {
            display: none;
        }

        .question.active {
            display: block;
        }

        .question h3 {
            color: #284432;
            margin-bottom: 20px;
        }

        /* options */

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .options button{
    padding:14px;
    border-radius:12px;
    border:2px solid #284432;
    background:white;
    cursor:pointer;
    transition:all 0.3s;
}

.options button.selected{
    background:#284432;
    color:white;
        }

        /* navigation */

        .quiz-navigation {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
        }

        .quiz-navigation button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #284432;
            color: white;
            cursor: pointer;
        }

        .quiz-navigation button:hover {
            background: #1e3325;
        }
    </style>

</head>

<body>
    <nav>
        <div class="nav_bar">
            <div class="identity">
                <img class="logo" src="my_white_logo.png" alt="company_whit_logo">
                <div class="name">Follic Ai</div>
            </div>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#how-it-works">How It Works</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>


    <div class="main-analysis">
    
    <section class="pic">
        <div class="user-pic">
            <img src="working.png" alt="user uploaded image" class="uploaded-image">
            <h2 class="upload-text">Your image</h2>
        </div>

    </section>


    <section class="questionnaire">

        <div class="quiz-container">

            <div class="quiz-header">
                <h2>Tell us more about your hair</h2>
                <p>Help us generate your personalized hair intelligence report.</p>
            </div>

            <div class="progress-bar">
                <div class="progress"></div>
            </div>

            <!-- QUESTION 1 -->
            <div class="question active">
                <h3>What is your biggest hair concern?</h3>

                <div class="options">
                    <button>Hair loss / thinning</button>
                    <button>Dandruff / scalp issues</button>
                    <button>Dry / damaged hair</button>
                    <button>Low density</button>
                    <button>Slow growth</button>
                    <button>Styling confusion</button>
                    <button>Oily scalp</button>
                </div>
            </div>

            <!-- QUESTION 2 -->
            <div class="question">
                <h3>Have you noticed hair shedding?</h3>

                <div class="options">
                    <button>No</button>
                    <button>Mild</button>
                    <button>Moderate</button>
                    <button>Severe</button>
                </div>
            </div>

            <!-- QUESTION 3 -->
            <div class="question">
                <h3>How would you describe your hair type?</h3>

                <div class="options">
                    <button>Straight</button>
                    <button>Wavy</button>
                    <button>Curly</button>
                    <button>Coily</button>
                </div>
            </div>

            <div class="quiz-navigation">
                <button id="prev">Previous</button>
                <button id="next">Next</button>
            </div>

        </div>

    </section>

    </div>

<script>
   const questions = document.querySelectorAll(".question");
const nextBtn = document.getElementById("next");
const prevBtn = document.getElementById("prev");
const progress = document.querySelector(".progress");

let current = 0;

const answers = {};

/* OPTION SELECTION */

document.querySelectorAll(".options button").forEach(button => {

    button.addEventListener("click", () => {

        button.classList.toggle("selected");

        const questionIndex = current;

        if(!answers[questionIndex]){
            answers[questionIndex] = [];
        }

        const value = button.innerText;

        if(answers[questionIndex].includes(value)){
            answers[questionIndex] =
                answers[questionIndex].filter(v => v !== value);
        }else{
            answers[questionIndex].push(value);
        }

    });

});

/* UPDATE QUIZ */

function updateQuiz(){

    questions.forEach((q,index)=>{
        q.classList.remove("active");

        if(index === current){
            q.classList.add("active");
        }
    });

    let percent = (current / (questions.length-1)) * 100;

    progress.style.width = percent + "%";
}

/* NEXT */

nextBtn.onclick = ()=>{

    if(current < questions.length-1){
        current++;
        updateQuiz();
    }else{
        console.log("User answers:",answers);
    }

}

/* PREVIOUS */

prevBtn.onclick = ()=>{

    if(current > 0){
        current--;
        updateQuiz();
    }

}

updateQuiz();
</script>

</body>

</html>
